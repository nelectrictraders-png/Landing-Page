<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title> National Electric Traders.
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --steel: #1a1f2e;
      --iron: #0d1117;
      --orange: #f4680c;
      --orange-dim: #c45208;
      --silver: #c8cdd8;
      --light: #eceef2;
      --mid: #5a6070;
      --card: #20263a;
      --border: #2e3550;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--iron);
      color: var(--light);
      overflow-x: hidden;
    }

    /* ─── NOISE OVERLAY ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ─── NAV ─── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 68px;
      background: rgba(13,17,23,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--light);
    }
    .nav-logo span { color: var(--orange); }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }
    .nav-links a {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--silver);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--orange); }

    .nav-cta {
      background: var(--orange);
      color: #fff !important;
      padding: 9px 22px;
      font-size: 12px !important;
      letter-spacing: 0.12em !important;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      transition: background 0.2s !important;
    }
    .nav-cta:hover { background: var(--orange-dim) !important; color: #fff !important; }

    /* ─── HERO ─── */
    #hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 120px 48px 80px;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 70% 50%, rgba(244,104,12,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 80% at 10% 80%, rgba(244,104,12,0.04) 0%, transparent 50%),
        linear-gradient(160deg, #0d1117 0%, #141824 100%);
    }

    .hero-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(244,104,12,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(244,104,12,0.06) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 70% 70% at 70% 50%, black 0%, transparent 70%);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 700px;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 20px;
    }
    .hero-eyebrow::before {
      content: '';
      display: block;
      width: 30px;
      height: 2px;
      background: var(--orange);
    }

    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(52px, 8vw, 96px);
      font-weight: 900;
      line-height: 0.92;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      margin-bottom: 28px;
    }
    h1 em {
      font-style: normal;
      color: var(--orange);
      display: block;
    }

    .hero-sub {
      font-size: 17px;
      font-weight: 300;
      color: var(--silver);
      line-height: 1.7;
      max-width: 520px;
      margin-bottom: 44px;
    }

    .hero-actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .btn-primary {
      background: var(--orange);
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 14px 36px;
      border: none;
      cursor: pointer;
      clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
      text-decoration: none;
      display: inline-block;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-primary:hover { background: var(--orange-dim); transform: translateY(-1px); }

    .btn-outline {
      background: transparent;
      color: var(--light);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 13px 36px;
      border: 1px solid var(--border);
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-outline:hover { border-color: var(--orange); color: var(--orange); }

    /* ─── STATS BAR ─── */
    .stats-bar {
      position: relative;
      z-index: 2;
      background: var(--card);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 0 48px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .stat-item {
      padding: 28px 0;
      border-right: 1px solid var(--border);
      text-align: center;
      animation: fadeUp 0.6s ease both;
    }
    .stat-item:last-child { border-right: none; }

    .stat-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 44px;
      font-weight: 900;
      color: var(--orange);
      line-height: 1;
    }
    .stat-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mid);
      margin-top: 4px;
    }

    /* ─── SECTIONS ─── */
    section { padding: 100px 48px; position: relative; }

    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 12px;
    }

    .section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(36px, 5vw, 58px);
      font-weight: 900;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 16px;
    }

    .section-sub {
      font-size: 16px;
      font-weight: 300;
      color: var(--silver);
      max-width: 540px;
      line-height: 1.7;
      margin-bottom: 56px;
    }

    /* ─── PRODUCTS ─── */
    #products { background: var(--steel); }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2px;
    }

    .product-card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 32px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.25s, transform 0.25s;
      cursor: pointer;
    }
    .product-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 100%;
      background: var(--orange);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.3s ease;
    }
    .product-card:hover { border-color: var(--orange); transform: translateY(-3px); }
    .product-card:hover::before { transform: scaleY(1); }

    .product-icon {
      font-size: 36px;
      margin-bottom: 16px;
      display: block;
    }

    .product-cat {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 8px;
    }

    .product-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .product-desc {
      font-size: 14px;
      color: var(--silver);
      line-height: 1.65;
      margin-bottom: 20px;
    }

    .product-specs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 24px;
    }
    .spec-tag {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--mid);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      padding: 3px 10px;
    }

    .product-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .product-price {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 26px;
      color: var(--light);
    }
    .product-price span {
      font-size: 13px;
      font-weight: 400;
      color: var(--mid);
      display: block;
      line-height: 1;
    }

    .product-btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--orange);
      background: transparent;
      border: 1px solid var(--orange);
      padding: 8px 18px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .product-btn:hover { background: var(--orange); color: #fff; }

    /* ─── SERVICES ─── */
    #services { background: var(--iron); }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .service-card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 36px 32px;
      transition: border-color 0.25s;
    }
    .service-card:hover { border-color: var(--orange); }

    .service-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 56px;
      font-weight: 900;
      color: rgba(244,104,12,0.12);
      line-height: 1;
      margin-bottom: 16px;
    }

    .service-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .service-desc {
      font-size: 14px;
      color: var(--silver);
      line-height: 1.7;
    }

    /* ─── WHY US ─── */
    #why {
      background: var(--steel);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
    }

    .why-left .section-title { margin-bottom: 24px; }

    .why-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .why-item {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .why-check {
      width: 22px;
      height: 22px;
      background: var(--orange);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
      font-size: 11px;
      clip-path: polygon(4px 0%, 100% 0%, calc(100% - 4px) 100%, 0% 100%);
    }
    .why-text {
      font-size: 15px;
      color: var(--silver);
      line-height: 1.6;
    }
    .why-text strong { color: var(--light); font-weight: 600; }

    .why-right {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
    }
    .why-stat-box {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 36px 28px;
      text-align: center;
    }
    .why-stat-box:nth-child(2) { margin-top: 32px; }
    .why-stat-box:nth-child(4) { margin-top: -32px; }

    .why-big {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 52px;
      font-weight: 900;
      color: var(--orange);
      line-height: 1;
    }
    .why-caption {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mid);
      margin-top: 6px;
    }

    /* ─── TESTIMONIALS ─── */
    #testimonials { background: var(--iron); }

    .testi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .testi-card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 32px;
    }

    .testi-stars {
      color: var(--orange);
      font-size: 16px;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .testi-text {
      font-size: 15px;
      color: var(--silver);
      line-height: 1.7;
      font-style: italic;
      margin-bottom: 24px;
    }

    .testi-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .testi-avatar {
      width: 40px;
      height: 40px;
      background: var(--orange);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 16px;
      clip-path: polygon(5px 0%, 100% 0%, calc(100% - 5px) 100%, 0% 100%);
    }
    .testi-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 15px;
      text-transform: uppercase;
    }
    .testi-role {
      font-size: 12px;
      color: var(--mid);
    }

    /* ─── CONTACT ─── */
    #contact {
      background: var(--steel);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: start;
    }

    .contact-info-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 32px;
    }
    .contact-info-item {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .contact-icon {
      width: 40px;
      height: 40px;
      background: rgba(244,104,12,0.1);
      border: 1px solid rgba(244,104,12,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .contact-detail strong {
      display: block;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 3px;
    }
    .contact-detail p {
      font-size: 15px;
      color: var(--silver);
    }

    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-field label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mid);
    }

    .form-field input,
    .form-field select,
    .form-field textarea {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--light);
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-field input:focus,
    .form-field select:focus,
    .form-field textarea:focus { border-color: var(--orange); }
    .form-field select option { background: var(--card); }
    .form-field textarea { resize: vertical; min-height: 100px; }

    /* ─── FOOTER ─── */
    footer {
      background: var(--iron);
      border-top: 1px solid var(--border);
      padding: 60px 48px 32px;
    }

    .footer-top {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 48px;
      margin-bottom: 48px;
    }

    .footer-brand-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 26px;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .footer-brand-name span { color: var(--orange); }

    .footer-tagline {
      font-size: 14px;
      color: var(--mid);
      line-height: 1.65;
      max-width: 260px;
    }

    .footer-col-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--light);
      margin-bottom: 16px;
    }

    .footer-links {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .footer-links a {
      font-size: 14px;
      color: var(--mid);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--orange); }

    .footer-bottom {
      border-top: 1px solid var(--border);
      padding-top: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-copy {
      font-size: 13px;
      color: var(--mid);
    }

    .footer-badges {
      display: flex;
      gap: 12px;
    }
    .badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mid);
      border: 1px solid var(--border);
      padding: 4px 10px;
    }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-content > * {
      opacity: 0;
      animation: fadeUp 0.7s ease forwards;
    }
    .hero-content > *:nth-child(1) { animation-delay: 0.1s; }
    .hero-content > *:nth-child(2) { animation-delay: 0.25s; }
    .hero-content > *:nth-child(3) { animation-delay: 0.4s; }
    .hero-content > *:nth-child(4) { animation-delay: 0.55s; }

    .stat-item:nth-child(1) { animation-delay: 0.1s; }
    .stat-item:nth-child(2) { animation-delay: 0.2s; }
    .stat-item:nth-child(3) { animation-delay: 0.3s; }
    .stat-item:nth-child(4) { animation-delay: 0.4s; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 900px) {
      nav { padding: 0 24px; }
      .nav-links { display: none; }
      section, #hero { padding: 80px 24px; }
      #why, #contact { grid-template-columns: 1fr; gap: 40px; }
      .services-grid, .testi-grid { grid-template-columns: 1fr; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); padding: 0 24px; }
      .footer-top { grid-template-columns: 1fr 1fr; }
      .why-right { display: none; }
      h1 { font-size: 52px; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ─── NAV ─── -->
<nav>
  <div class="nav-logo">Mac<span>Industrial</span></div>
  <ul class="nav-links">
    <li><a href="#products">Products</a></li>
    <li><a href="#services">Services</a></li>
    <li><a href="#why">About</a></li>
    <li><a href="#testimonials">Reviews</a></li>
    <li><a href="#contact" class="nav-cta">Get a Quote</a></li>
  </ul>
</nav>

<!-- ─── HERO ─── -->
<section id="hero">
  <div class="hero-bg"></div>
  <div class="hero-grid"></div>
  <div class="hero-content">
    <div class="hero-eyebrow">Trusted Industrial Supplier Since 2010</div>
    <h1>Heavy Duty <em>Equipment</em> Built to Last</h1>
    <p class="hero-sub">MacIndustrial Supply Co. delivers premium industrial machinery, tools, and equipment for manufacturing, construction, and processing operations worldwide.</p>
    <div class="hero-actions">
      <a href="#products" class="btn-primary">Browse Products</a>
      <a href="#contact" class="btn-outline">Request a Quote</a>
    </div>
  </div>
</section>

<!-- ─── STATS ─── -->
<div class="stats-bar">
  <div class="stat-item">
    <div class="stat-num">500+</div>
    <div class="stat-label">Products In Stock</div>
  </div>
  <div class="stat-item">
    <div class="stat-num">15+</div>
    <div class="stat-label">Years Experience</div>
  </div>
  <div class="stat-item">
    <div class="stat-num">1,200+</div>
    <div class="stat-label">Clients Served</div>
  </div>
  <div class="stat-item">
    <div class="stat-num">98%</div>
    <div class="stat-label">Satisfaction Rate</div>
  </div>
</div>

<!-- ─── PRODUCTS ─── -->
<section id="products">
  <div class="section-label">Our Catalog</div>
  <div class="section-title">Industrial Equipment & Pricing</div>
  <p class="section-sub">All products are certified, in-stock, and ready for deployment. Bulk pricing available on request.</p>

  <div class="products-grid">

    <div class="product-card">
      <span class="product-icon">⚙️</span>
